---
default_stages: [pre-commit]
repos:
  # 1. Linting & formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # 2. Type checking
  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.59
    hooks:
      - id: ty

  # 3. Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: 'package-lock\.json|.*\.onnx|.*\.joblib|.*\.parquet|.*\.dvc'

  # 4. Infrastructure & config quality
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        entry: hadolint --ignore DL3008 --ignore DL3013
        stages: [pre-push]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        stages: [pre-push]

  - repo: https://github.com/pappasam/toml-sort
    rev: v0.24.4
    hooks:
      - id: toml-sort
        args: [--in-place, --all]
        exclude: ^(uv\.lock|pyproject\.toml)$

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-d, "{rules: {line-length: disable, commas: {min-spaces-after: 1}}}"]

  # 5. Notebook sanitization
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout

  # 6. Common hooks & large file prevention
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: mixed-line-ending
        args: [--fix=lf]

  # 7. Sync uv tools
  - repo: https://github.com/tsvikas/sync-with-uv
    rev: v0.6.0
    hooks:
      - id: sync-with-uv
        stages: [pre-push]

  # 8. Commit hygiene
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # 9. Fix common typos & refurbish codebase
  - repo: https://github.com/crate-ci/typos
    rev: v1.48.0
    hooks:
      - id: typos
        args: [--write-changes]

  - repo: https://github.com/dosisod/refurb
    rev: v2.3.1
    hooks:
      - id: refurb
        args: ["--ignore", "FURB101,FURB103"]
        stages: [pre-push]
