---
name: CI Pipeline

# Triggers
"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # Allow manual trigger

# Concurrency guard
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Restrict GITHUB_TOKEN to least privilege
permissions:
  contents: read

# Global environment variables
env:
  PYTHON_VERSION: "3.12"
  UV_SYSTEM_PYTHON: 1
  UV_CACHE_DIR: /tmp/.uv-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Jobs
jobs:
  # JOB 1 · Pre-Commit Hooks
  pre-commit:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 1. Checkout full repo history
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      # 2. Install uv (fast dependency manager)
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # 3. Install Python via uv
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      # 4. Install dependencies (strict lockfile enforcement)
      - name: Install dependencies
        run: uv sync --frozen --all-extras

      # 5. Cache pre-commit environments (huge speed boost)
      - name: Cache pre-commit
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-

      # 6. Run pre-commit hooks
      - name: Run pre-commit hooks
        run: |
          uv run pre-commit run --all-files \
            --show-diff-on-failure --color=always
